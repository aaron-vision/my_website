# Configuration of Hugo
# Guide: https://docs.hugoblox.com/tutorial/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Website name (set in params.yaml under hugoblox.branding.name)
title: "hugo yaml 常帅的学术主页"
# Website URL
baseURL: "https://aaron-vision.github.io/my_website/"
canonifyURLs: true

# 【核心：这是你缺少的皮肤和逻辑模块】
module:
  imports:
    - path: github.com/HugoBlox/kit/modules/blox
    - path: github.com/HugoBlox/kit/modules/slides

############################
## LANGUAGE
############################

# 1. 设置默认语言指针
defaultContentLanguage: zh-Hans
hasCJKLanguage: true
defaultContentLanguageInSubdir: false
removePathAccents: true

# 2. 核心补丁：显式定义 zh-Hans 语言块
languages:
  zh-Hans:
    languageCode: zh-Hans
    languageName: "简体中文"
    weight: 1
    contentDir: content  # 确保它指向你的内容文件夹
############################
## PAGE OPTIONS
############################

cascade:
  - _target:
      path: /slides/**
      kind: page
    outputs: [HTML, present]

############################
## ADVANCED
############################

build:
  writeStats: true
enableGitInfo: false
summaryLength: 30
pagination:
  pagerSize: 10
enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>
ignoreFiles: [".ipynb_checkpoints$", "\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
disableAliases: true
outputs:
  home: [HTML, RSS, headers, redirects, backlinks]
  section: [HTML, RSS]
imaging:
  resampleFilter: lanczos
  quality: 90
  anchor: smart
  hint: picture
timeout: 600000
taxonomies:
  author: authors
  tag: tags
  publication_type: publication_types
markup:
  goldmark:
    renderer:
      unsafe: true # 允许在 Markdown 中使用 HTML 标签（如调整图片大小）
  highlight:
    style: github-light # 代码高亮风格
security:
  _merge: deep
sitemap:
  _merge: deep
